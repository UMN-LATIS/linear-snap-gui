name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*

jobs:
  build:
    name: Build ${{ matrix.app_name }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      PRIVATE_SDK_TOKEN: ${{ secrets.PRIVATE_SDK_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-26
            target: macos
            app_name: LinearSnap
            spec: LinearSnap.spec
            artifact_name: LinearSnap-macOS.zip
            bundle_dir: LinearSnap.app
          - os: macos-26
            target: macos
            app_name: StandaloneCamera
            spec: StandaloneCamera.spec
            artifact_name: StandaloneCamera-macOS.zip
            bundle_dir: StandaloneCamera.app
          - os: windows-latest
            target: windows
            app_name: LinearSnap
            spec: LinearSnap.spec
            artifact_name: LinearSnap-Windows.zip
            bundle_dir: LinearSnap
          - os: windows-latest
            target: windows
            app_name: StandaloneCamera
            spec: StandaloneCamera.spec
            artifact_name: StandaloneCamera-Windows.zip
            bundle_dir: StandaloneCamera

    steps:
      - uses: actions/checkout@v4

      - name: Fetch canon-sdk
        shell: bash
        run: |
          if [ -d canon-sdk ]; then
            echo "canon-sdk already present"
            exit 0
          fi

          if [ -z "${PRIVATE_SDK_TOKEN:-}" ]; then
            echo "PRIVATE_SDK_TOKEN is required to clone canon-sdk"
            exit 1
          fi

          git clone "https://x-access-token:${PRIVATE_SDK_TOKEN}@github.com/UMN-LATIS/canon-sdk.git" canon-sdk
          test -d canon-sdk

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller --noconfirm "${{ matrix.spec }}"

      - name: Package artifact (macOS)
        if: matrix.target == 'macos'
        shell: bash
        run: |
          cd dist
          zip -r9 "${{ matrix.artifact_name }}" "${{ matrix.bundle_dir }}"

      - name: Package artifact (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.bundle_dir }}/*" -DestinationPath "dist/${{ matrix.artifact_name }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  release:
    name: Publish Release Assets
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            RELEASE_NAME="Release ${TAG_NAME}"
            PRERELEASE_FLAG=""
          else
            TAG_NAME="latest"
            RELEASE_NAME="Development Build"
            PRERELEASE_FLAG="--prerelease"
          fi

          if ! gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${TAG_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${RELEASE_NAME}" \
              ${PRERELEASE_FLAG}
          fi

          if [[ "${TAG_NAME}" == "latest" ]]; then
            gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets -q '.assets[].name' | while IFS= read -r asset_name; do
              if [[ -n "${asset_name}" ]]; then
                gh release delete-asset "${TAG_NAME}" "${asset_name}" --repo "${GITHUB_REPOSITORY}" || true
              fi
            done
          fi

          find artifacts -type f -name '*.zip' -print0 | while IFS= read -r -d '' zip_file; do
            gh release upload "${TAG_NAME}" "${zip_file}" --repo "${GITHUB_REPOSITORY}" --clobber
          done
