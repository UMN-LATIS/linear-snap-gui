name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    tags:
      - 'v*'

jobs:
  build:
    name: Build packages
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-26-xlarge
            TARGET: macos
            CMD_BUILD: >
                pyinstaller -i icon.icns -w -n LinearSnap app.py &&
                cd dist/ &&
                zip -r9 LinearSnapMac LinearSnap.app/
            OUT_FILE_NAME: LinearSnapMac.zip
            ASSET_MIME: application/zip
          - os: windows-latest
            TARGET: windows
            CMD_BUILD: >
                pyinstaller -i icon.icns -w -n LinearSnap app.py &&
                cd dist/ &&
                7z a LinearSnapWindows.zip -r *
            OUT_FILE_NAME: LinearSnapWindows.zip
            ASSET_MIME: application/zip
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Install macOS dependencies
      if: matrix.os == 'macos-26-xlarge'
      run: brew install libgphoto2
    - name: Build with pyinstaller for ${{matrix.TARGET}}
      run: ${{matrix.CMD_BUILD}}
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        path: dist/${{matrix.OUT_FILE_NAME}}
        name: LinearSnap-${{ matrix.TARGET }}-${{ github.run_number }}

  release:
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create/Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ ${{ github.ref }} == refs/tags/v* ]]; then
            # Tagged release - create permanent release
            TAG_NAME=${GITHUB_REF#refs/tags/}
            RELEASE_NAME="Release $TAG_NAME"
            PRERELEASE="false"
          else
            # Main branch push - update development release
            TAG_NAME="latest"
            RELEASE_NAME="Development Build"
            PRERELEASE="true"
          fi

          # Check if release exists
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            # For latest, delete old assets before uploading new ones
            if [[ $TAG_NAME == "latest" ]]; then
              gh release delete-asset "$TAG_NAME" LinearSnapMac.zip 2>/dev/null || true
              gh release delete-asset "$TAG_NAME" LinearSnapWindows.zip 2>/dev/null || true
            fi
          else
            # Create new release
            gh release create "$TAG_NAME" \
              --title "$RELEASE_NAME" \
              --prerelease=$PRERELEASE
          fi

          # Upload all artifacts
          gh release upload "$TAG_NAME" artifacts/*/*  --clobber
