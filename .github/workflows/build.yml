name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - "*"

jobs:
  pre-release:
    name: Pre Release
    runs-on: ubuntu-latest
    steps:
      - uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          title: "Development Build"

  build:
    name: Build ${{ matrix.app }} (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      PRIVATE_SDK_TOKEN: ${{ secrets.PRIVATE_SDK_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-16
            target: macos
            app: linear-snap
            spec: LinearSnap.spec
            artifact: LinearSnap-macOS.zip
            bundle_dir: LinearSnap.app
          - os: macos-16
            target: macos
            app: standalone-camera
            spec: StandaloneCamera.spec
            artifact: StandaloneCamera-macOS.zip
            bundle_dir: StandaloneCamera.app
          - os: windows-latest
            target: windows
            app: linear-snap
            spec: LinearSnap.spec
            artifact: LinearSnap-Windows.zip
            bundle_dir: LinearSnap
          - os: windows-latest
            target: windows
            app: standalone-camera
            spec: StandaloneCamera.spec
            artifact: StandaloneCamera-Windows.zip
            bundle_dir: StandaloneCamera

    steps:
      - uses: actions/checkout@v4

      - name: Fetch canon-sdk
        shell: bash
        run: |
          if [ -d canon-sdk ]; then
            echo "canon-sdk already present"
            exit 0
          fi

          if [ -z "${PRIVATE_SDK_TOKEN:-}" ]; then
            echo "PRIVATE_SDK_TOKEN is required to clone canon-sdk"
            exit 1
          fi

          git clone "https://x-access-token:${PRIVATE_SDK_TOKEN}@github.com/UMN-LATIS/canon-sdk.git" canon-sdk
          test -d canon-sdk

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: |
          pyinstaller --noconfirm "${{ matrix.spec }}"

      - name: Package artifact (macOS)
        if: matrix.target == 'macos'
        shell: bash
        run: |
          cd dist
          zip -r9 "${{ matrix.artifact }}" "${{ matrix.bundle_dir }}"

      - name: Package artifact (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.bundle_dir }}/*" -DestinationPath "dist/${{ matrix.artifact }}" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4

      - name: Upload to latest release
        if: github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh api repos/${GITHUB_REPOSITORY}/releases/tags/latest | jq -r '.assets[] | [.url] | @tsv' | xargs -n 1 gh api -X DELETE || true
          find . -name "*.zip" -print0 | xargs -0 -I {} gh release upload --repo ${GITHUB_REPOSITORY} --clobber latest "{}"